server:
  port: 8080
  servlet:
    context-path: /

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/${MYSQL_DB:sm_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource

jwt:
  token:
    tokenExpiration: ${JWT_TOKEN_EXPIRATION:120}
    tokenSignKey: ${JWT_TOKEN_SIGN_KEY:headline123456}

app:
  upload-dir: ${APP_UPLOAD_DIR:/app/uploads}

llm:
  base-url: ${LLM_BASE_URL:}
  api-key: ${LLM_API_KEY:}
  model: ${LLM_MODEL:gpt-4o-mini}
  temperature: ${LLM_TEMPERATURE:0.7}
