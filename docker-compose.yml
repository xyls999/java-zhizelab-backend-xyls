version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: social-mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_me_root_pwd}
      MYSQL_DATABASE: ${MYSQL_DB:-sm_db}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-change_me_root_pwd}"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: social-app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: ${MYSQL_DB:-sm_db}
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_me_root_pwd}
      JWT_TOKEN_EXPIRATION: ${JWT_TOKEN_EXPIRATION:-120}
      JWT_TOKEN_SIGN_KEY: ${JWT_TOKEN_SIGN_KEY:-change_me_jwt_key}
      APP_UPLOAD_DIR: /app/uploads
    ports:
      - "8080:8080"
    volumes:
      - app_uploads:/app/uploads
    restart: unless-stopped

volumes:
  mysql_data:
  app_uploads:
